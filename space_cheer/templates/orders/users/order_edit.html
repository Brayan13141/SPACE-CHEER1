{% extends "core/base.html" %}
{% block content %}

<div class="container py-3 py-md-4">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">
    <div>
      <h1 class="h2 mb-1">Editar orden #{{ order.id }}</h1>
      <p class="text-muted mb-0">Notas de diseño y observaciones</p>
    </div>
    <div class="mt-3 mt-md-0">
      <a href="{% url 'orders:detail_order' order.id %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Cancelar
      </a>
    </div>
  </div>

  <div class="card shadow-sm" style="max-width: 640px;">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-4">
          <label class="form-label fw-semibold">Notas de diseño</label>
          <textarea name="design_notes" class="form-control" rows="5" placeholder="Instrucciones especiales, colores, personalizaciones...">{{ order.design_notes }}</textarea>
          <div class="form-text">Estas notas serán visibles para el equipo de producción.</div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save me-1"></i>Guardar cambios
          </button>
          <a href="{% url 'orders:detail_order' order.id %}" class="btn btn-outline-secondary">
            Cancelar
          </a>
        </div>

      </form>
    </div>
  </div>

</div>

{% endblock %}
