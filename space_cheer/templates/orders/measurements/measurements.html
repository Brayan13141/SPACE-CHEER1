{% extends "core/base.html" %}
{% block content %}

<div class="container py-4">
  <h3 class="mb-3">
    Medidas – {{ athlete_item.athlete.get_full_name|default:athlete_item.athlete.username }}
  </h3>

  <p class="text-muted">
    Producto: <strong>{{ athlete_item.order_item.product.name }}</strong>
  </p>

  <form method="post" class="card shadow-sm p-4">
    {% csrf_token %}

    {% for pmf in fields %}
      <div class="mb-3">
        <label class="form-label fw-semibold">
          {{ pmf.field.name }}
          {% if pmf.required %}
            <span class="text-danger">*</span>
          {% endif %}
          {% if pmf.field.unit %}
            <small class="text-muted">({{ pmf.field.unit }})</small>
          {% endif %}
        </label>

        <input
          type="text"
          name="{{ pmf.field.slug }}"
          class="form-control"
          {% if pmf.required %}required{% endif %}
        >
      </div>
    {% endfor %}

    <div class="d-flex justify-content-between">
      <a href="{% url 'orders:detail' athlete_item.order_item.order.id %}"
         class="btn btn-outline-secondary">
        Volver
      </a>
      <button type="submit" class="btn btn-primary">
        Guardar medidas
      </button>
    </div>
  </form>
</div>

{% endblock %}
