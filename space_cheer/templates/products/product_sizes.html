{% extends "core/base.html" %}

{% block content %}

<div class="container py-4">

<h2>Configurar tallas</h2>

<p class="text-muted">
Producto: <strong>{{ product.name }}</strong>
</p>

<a href="{% url 'products:product_size_add' product.id %}"
class="btn btn-primary mb-3">

Agregar talla

</a>

<table class="table table-bordered">

<thead>
<tr>
<th>Talla</th>
<th>Precio adicional</th>
</tr>
</thead>

<tbody>

{% for size in sizes %}

<tr>
<td>{{ size.size }}</td>
<td>${{ size.additional_price }}</td>
</tr>

{% empty %}

<tr>
<td colspan="2" class="text-center text-muted">
No hay tallas configuradas
</td>
</tr>

{% endfor %}

</tbody>

</table>

<a href="{% url 'products:list_products' %}"
class="btn btn-outline-secondary">

Volver

</a>

</div>

{% endblock %}
