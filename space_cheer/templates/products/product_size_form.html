{% extends "core/base.html" %}

{% block content %}

<div class="container py-4">

<h2>Agregar talla</h2>

<p class="text-muted">
Producto: {{ product.name }}
</p>

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Talla</label>

<input
type="text"
name="size"
class="form-control"
placeholder="Ej: S, M, L"
required>

</div>

<div class="mb-3">

<label class="form-label">Precio adicional</label>

<input
type="number"
step="0.01"
name="additional_price"
class="form-control"
value="0">

</div>

<button class="btn btn-success">
Guardar
</button>

<a href="{% url 'products:product_sizes' product.id %}"
class="btn btn-outline-secondary">

Cancelar

</a>

</form>

</div>

{% endblock %}
