{% extends "core/base.html" %}
{% load i18n %}
{% block content %}

<div class="container mt-4">
  <h2>{% trans "Eliminar dirección" %}</h2>

  <div class="alert alert-warning">
    {% blocktrans with label=address.label %}¿Seguro que deseas eliminar la dirección <strong>{{ label }}</strong>?{% endblocktrans %}
  </div>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
      {% trans "Sí, eliminar" %}
    </button>
    <a href="{% url 'addresses:list' %}" class="btn btn-secondary">
      {% trans "Cancelar" %}
    </a>
  </form>
</div>

{% endblock %}
