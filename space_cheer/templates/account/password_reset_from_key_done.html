{% extends "core/base.html" %}
{% load i18n %}

{% block title %}Contraseña cambiada - SPACE CHEER{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0">✅ ¡Contraseña actualizada!</h4>
                </div>
                <div class="card-body text-center p-4">
                    <i class="bi bi-check-circle-fill fs-1 text-success mb-3"></i>
                    <h5 class="card-title">Tu contraseña ha sido cambiada exitosamente.</h5>
                    <p class="card-text text-muted">
                        Ahora puedes iniciar sesión con tu nueva contraseña.
                    </p>
                    <a href="{% url 'account_login' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
